.rainbow{animation:rainbow 2s linear infinite;font-weight:600;}
*{box-sizing:border-box;margin:0;padding:0;}

.app{max-width:420px;margin:0 auto;padding:0 0 80px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;line-height:1;color:var(--text);}
h2{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1.5px;color:var(--text);}
h3{font-size:14px;font-weight:500;color:var(--text);}
.hero{padding:32px 20px 0;}
.hero-tag{font-size:10px;font-weight:500;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}

.band-label{font-size:10px;letter-spacing:2px;color:#666;text-transform:uppercase;flex:1;}
.band-value{font-size:12px;font-weight:500;color:#f5f0e8;letter-spacing:1px;}
.screen{padding:0 20px;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;}
.card-sm{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:8px;border:0.5px solid var(--border);}
.player-btn{width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:8px;transition:background 0.15s;text-align:left;}
.player-btn:hover{background:var(--surface2);}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-lg{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.name{font-size:15px;font-weight:500;color:var(--text);}
.sub{font-size:12px;color:var(--muted);margin-top:2px;}
.pin-wrap{display:flex;gap:10px;margin:16px 0;}
.pin-wrap input{flex:1;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-size:24px;text-align:center;letter-spacing:6px;padding:14px;outline:none;}
.pin-wrap input:focus{border-color:#1a1a1a;}
.btn{display:block;width:100%;padding:13px;font-size:14px;font-weight:500;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;margin-bottom:8px;transition:background 0.15s;}
.btn:hover{background:#eae6de;}
.btn.accent{background:#1a1a1a;border-color:#1a1a1a;color:#f5f0e8;font-weight:600;}
.btn.accent:hover{background:#2d2d2d;}
.btn.sm{width:auto;display:inline-block;padding:6px 12px;font-size:12px;margin-bottom:0;}
.btn.warn{border-color:#d97706;color:#d97706;background:transparent;}
.btn.warn:hover{background:rgba(217,119,6,0.06);}
.err{font-size:12px;color:#dc2626;margin-top:6px;}
.ok{font-size:12px;color:#16a34a;margin-top:6px;}
.back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;padding:16px 20px 8px;}
.back:hover{color:var(--text);}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto;}
.tab{padding:10px 12px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab.on{color:var(--text);border-bottom-color:var(--text);}
.pts-big{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;color:var(--text);}

.badge.locked{background:#fef2f2;color:#dc2626;border:0.5px solid #fecaca;}

.pick-btns button.sel{background:#1a1a1a;color:#f5f0e8;border-color:#1a1a1a;}
.notice{background:var(--surface2);border-radius:var(--radius);padding:14px;font-size:13px;color:var(--muted);text-align:center;margin-bottom:12px;border:0.5px solid var(--border);}

.divider{height:1px;background:var(--border);margin:16px 0;}

function isGroupOpen(s){return s.groupStageOpen && new Date()<GROUP_DEADLINE;}
function isKnockoutOpen(s,rnd){if(!s.knockoutRounds[rnd])return false;const dl=s.knockoutDeadlines[rnd];return !dl||new Date()<new Date(dl);}
function groupDeadlinePassed(){return new Date()>=GROUP_DEADLINE;}
function knockoutDeadlinePassed(s,rnd){if(!s.knockoutRounds[rnd])return false;const dl=s.knockoutDeadlines[rnd];return dl?new Date()>=new Date(dl):false;}

function calcScore(name,s){
  let sc=0;
  const picks=s.picks[name]||{};
  const groups=picks.groups||{};
  const knockout=picks.knockout||{};
  const resGroups=(s.results&&s.results.groups)||{};
  const resKnockout=(s.results&&s.results.knockout)||{};
  GROUPS.forEach(g=>{
    const res=resGroups[g.name],pick=groups[g.name];
    if(!res||!pick)return;
    if(pick.first&&(pick.first===res.first||pick.first===res.second))sc+=1;
    if(pick.first&&pick.first===res.first)sc+=1;
    if(pick.second&&(pick.second===res.first||pick.second===res.second))sc+=1;
    if(pick.second&&pick.second===res.second)sc+=1;
  });
  ROUND_KEYS.forEach(rnd=>{
    const rr=resKnockout[rnd]||{};
    const rp=knockout[rnd]||{};
    Object.keys(rr).forEach(mid=>{
      const winner=rr[mid],pick=rp[mid];
      if(!pick||!winner||pick.team!==winner)return;
      const pts=POINT_RULES[rnd];
      sc+=pick.isWildcard?(pts.wildcard||pts.correct):pts.correct;
    });
  });
  return sc;
}

  const picks=s.picks[name]||{};
  const groups=picks.groups||{};
  const knockout=picks.knockout||{};
  const resGroups=(s.results&&s.results.groups)||{};
  const resKnockout=(s.results&&s.results.knockout)||{};
  GROUPS.forEach(g=>{
    const res=resGroups[g.name],pick=groups[g.name];
    if(!res||!pick)return;
    if(pick.first&&(pick.first===res.first||pick.first===res.second))bd.group+=1;
    if(pick.first&&pick.first===res.first)bd.group+=1;
    if(pick.second&&(pick.second===res.first||pick.second===res.second))bd.group+=1;
    if(pick.second&&pick.second===res.second)bd.group+=1;
  });
  ROUND_KEYS.forEach(rnd=>{
    const rr=resKnockout[rnd]||{};
    const rp=knockout[rnd]||{};
    Object.keys(rr).forEach(mid=>{
      const winner=rr[mid],pick=rp[mid];
      if(!pick||!winner||pick.team!==winner)return;
      const pts=POINT_RULES[rnd];
      bd[rnd]+=(pick.isWildcard?(pts.wildcard||pts.correct):pts.correct);
    });
  });
  return bd;
}

function fmt(ds){if(!ds)return"";return new Date(ds).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit",timeZone:"America/Los_Angeles",timeZoneName:"short"});}

function timeLeft(){
  const diff=GROUP_DEADLINE-new Date();
  if(diff<=0)return null;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  if(h>48)return"Closes Jun 10, 11:59 PM PT";
  if(h>0)return`Closes in ${h}h ${m}m`;
  return`Closes in ${m}m`;
}

function resolveTeam(slot,s){
  if(!slot)return null;
  if(slot.type==="group"){const res=(s.results&&s.results.groups)||{};const r=res[slot.g];if(!r)return null;return slot.pos==="1st"?r.first:r.second;}
  if(slot.type==="third"){return thirdSlots[slot.groups]||null;}
  if(slot.type==="winner"){return(s.bracketResults||{})[slot.rnd]?.[slot.mid]||null;}
  if(slot.type==="loser"){
    const rndMatches=BRACKET_MATCHES[slot.rnd]||[];
    const match=rndMatches.find(function(m){return m.id===slot.mid;});
    if(!match)return null;
    const winner=(s.bracketResults||{})[slot.rnd]?.[slot.mid];
    if(!winner)return null;
    const home=resolveTeam(match.home,s);
    const away=resolveTeam(match.away,s);
    return home===winner?away:home;
  }
  return null;
}

function getSlotLabel(slot,s){
  if(!slot)return"TBD";
  if(slot.type==="group")return(slot.pos==="1st"?"1":"2")+slot.g;
  if(slot.type==="third")return"3rd "+slot.groups;
  if(slot.type==="winner"){const t=resolveTeam(slot,s);if(t)return t;const m=((BRACKET_MATCHES[slot.rnd])||[]).find(function(x){return x.id===slot.mid;});return m?"W "+m.label:"TBD";}
  if(slot.type==="loser"){const t=resolveTeam(slot,s);return t||"TBD";}
  return"TBD";
}

function renderMatchCard(match,rndKey,s,colWidth){
  var home=resolveTeam(match.home,s)||getSlotLabel(match.home,s);
  var away=resolveTeam(match.away,s)||getSlotLabel(match.away,s);
  var winner=((s.bracketResults||{})[rndKey]||{})[match.id]||"";
  var homeIsReal=!!resolveTeam(match.home,s);
  var awayIsReal=!!resolveTeam(match.away,s);
  var homeWon=winner&&winner===home;
  var awayWon=winner&&winner===away;
  var isFinal=rndKey==="final";
  var flag=function(t){return FLAGS[t]||"";};
  var w=colWidth-8;
  var html="";
  html+='<div style="background:#fff;border:0.5px solid '+(isFinal?"#1a1a1a":"#e8e4dc")+';border-radius:8px;overflow:hidden;width:'+w+'px">';
  html+='<div style="display:flex;align-items:center;padding:6px 8px;border-bottom:0.5px solid #f0ede6;background:'+(homeWon?"#f0fdf4":"#fff")+'">';

  html+='<span style="font-size:11px;font-weight:'+(homeIsReal?500:400)+';color:'+(homeIsReal?(homeWon?"#16a34a":"#1a1a1a"):"#b0a898")+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+home+'</span>';

  html+='</div>';
  html+='<div style="display:flex;align-items:center;padding:6px 8px;background:'+(awayWon?"#f0fdf4":"#fff")+'">';
  if(awayIsReal)html+='<span style="margin-right:5px;font-size:13px">'+flag(away)+'</span>';
  html+='<span style="font-size:11px;font-weight:'+(awayIsReal?500:400)+';color:'+(awayIsReal?(awayWon?"#16a34a":"#1a1a1a"):"#b0a898")+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+away+'</span>';
  if(winner)html+='<span style="font-size:11px;font-weight:600;color:'+(awayWon?"#16a34a":"transparent")+';margin-left:4px">✓</span>';
  html+='</div></div>';
  return html;
}

function renderBracket(){
  var s=state;
  var COL_WIDTH=148;
  var R32_H=52,R32_GAP=20,SLOT=R32_H+R32_GAP;
  var numR32=16;
  var totalH=numR32*SLOT-R32_GAP;
  var RENDER_ROUNDS=[
    {key:"r32",full:"Round of 32"},
    {key:"r16",full:"Round of 16"},
    {key:"qf",full:"Quarterfinals"},
    {key:"sf",full:"Semifinals"},
    {key:"final",full:"Final & 3rd Place"}
  ];
  var tabsHtml="";
  BRACKET_ROUNDS.forEach(function(r){
    tabsHtml+='<div class="btab" data-action="bracket-scroll" data-rnd="'+r.key+'" style="padding:8px 10px;font-size:12px;font-weight:500;color:#b0a898;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;white-space:nowrap;flex-shrink:0">'+r.label+'</div>';
  });
  var html="";
  html+='<div>';
  html+='<div id="bracket-tabs" style="display:flex;gap:0;overflow-x:auto;border-bottom:1px solid #e8e4dc;scrollbar-width:none;">'+tabsHtml+'</div>';
  html+='<div id="bracket-outer" style="overflow-x:auto;scrollbar-width:none;padding:12px 0 16px;">';
  html+='<div style="display:flex;gap:0;padding:0 20px;">';
  RENDER_ROUNDS.forEach(function(rnd,ri){
    var slotSize=SLOT*Math.pow(2,ri);
    html+='<div id="bcol-'+rnd.key+'" style="width:'+COL_WIDTH+'px;flex-shrink:0;position:relative;height:'+(totalH+60)+'px;">';
    html+='<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#b0a898;margin-bottom:6px;padding:0 4px">'+rnd.full+'</div>';
    if(rnd.key==="final"){
      // SF slot size = SLOT * 2^3. Two SF matches sit at top and bottom of totalH.
      // SF match 1 center = slotSize/2, SF match 2 center = totalH - slotSize/2
      // Final should sit exactly between them = totalH/2
      // 3rd place sits between the bottom SF and the bottom of the bracket
      var sfSlotSize=SLOT*Math.pow(2,3); // 576px
      var sf1Center=sfSlotSize/2; // center of top SF match
      var sf2Center=totalH-sfSlotSize/2; // center of bottom SF match
      var finalCenter=(sf1Center+sf2Center)/2; // exactly between
      var finalTop=Math.round(finalCenter-R32_H/2)+16;
      // 3rd place: between bottom SF and end of bracket, with a 24px gap below Final
      var thirdCenter=(sf2Center+totalH)/2;
      var thirdTop=Math.round(thirdCenter-R32_H/2)+16;
      // Ensure at least 24px gap between Final bottom and 3rd place label
      // Gap between Final and 3rd place = same as R32 gap (R32_GAP = 20px)
      var thirdTop=finalTop+R32_H+R32_GAP+16; // 16px for the "3rd Place" label
      var fm=(BRACKET_MATCHES["final"]||[])[0];
      var tm=(BRACKET_MATCHES["third"]||[])[0];
      if(fm)html+='<div style="position:absolute;top:'+finalTop+'px;left:0">'+renderMatchCard(fm,"final",s,COL_WIDTH)+'</div>';
      if(tm){
        html+='<div style="position:absolute;top:'+(thirdTop-14)+'px;left:0;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#b0a898">3rd Place</div>';
        html+='<div style="position:absolute;top:'+thirdTop+'px;left:0">'+renderMatchCard(tm,"third",s,COL_WIDTH)+'</div>';
      }
    } else {
      var matches=BRACKET_MATCHES[rnd.key]||[];
      matches.forEach(function(match,mi){
        var matchTop=Math.round(mi*slotSize+slotSize/2-R32_H/2)+16;
        html+='<div style="position:absolute;top:'+matchTop+'px;left:0">'+renderMatchCard(match,rnd.key,s,COL_WIDTH)+'</div>';
      });
    }
    html+='</div>';
  });
  html+='</div></div>';
  html+='<div style="padding:0 20px 4px;font-size:11px;color:#b0a898">&#8592; Swipe to see full bracket</div>';
  html+='</div>';
  return html;
}

function renderGroupStandings(){
  var gs=state.groupStandings||{};
  var html='<div style="padding-top:4px">';
  GROUPS.forEach(function(g){
    var teams=g.teams.slice().sort(function(a,b){
      var da=gs[g.name]?.[a]||{pts:0,gd:0};
      var db=gs[g.name]?.[b]||{pts:0,gd:0};
      if(db.pts!==da.pts)return db.pts-da.pts;
      return db.gd-da.gd;
    });
    html+='<div class="card" style="padding:12px 16px;margin-bottom:8px">';
    html+='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:18px;letter-spacing:1.5px;margin-bottom:10px">Group '+g.name+'</div>';
    html+='<div style="display:flex;align-items:center;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;padding:0 2px">';
    html+='<span style="width:20px"></span><span style="flex:1">Team</span>';
    html+='<span style="width:36px;text-align:center">PTS</span><span style="width:36px;text-align:center">GD</span></div>';
    teams.forEach(function(team,i){
      var d=gs[g.name]?.[team]||{pts:0,gd:0};
      var isTop2=i<2;
      var gdStr=d.gd>0?"+"+d.gd:d.gd===0?"0":""+d.gd;

      html+='<div style="font-size:12px;color:'+(isTop2?"var(--muted2)":"#ccc8be")+';width:20px;font-weight:500">'+(i+1)+'</div>';

      html+='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;width:36px;text-align:center;color:'+(isTop2?"var(--text)":"var(--muted)")+'">'+d.pts+'</div>';
      html+='<div style="font-size:13px;font-weight:500;width:36px;text-align:center;color:'+gdColor+'">'+gdStr+'</div>';
      html+='</div>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function attachHandlers(){
  const pinField=document.getElementById("pin-field");
  if(pinField)pinField.onkeydown=e=>{if(e.key==="Enter")handleAction("submit-pin",{});};
  const wcSel=document.getElementById("wc-select");
  if(wcSel)wcSel.onchange=e=>{koWildcard=e.target.value;};
}

async function handleAction(action, dataset){
  if(action==="select-player"){
    currentPlayer=PLAYERS.find(p=>p.name===dataset.name);
    isAdmin=false; view="pin"; render();
    setTimeout(()=>document.getElementById("pin-field")?.focus(),50);
  }
  else if(action==="select-admin"){isAdmin=true;currentPlayer=null;view="pin";render();setTimeout(()=>document.getElementById("pin-field")?.focus(),50);}
  else if(action==="back-login"){view="login";render();}
  else if(action==="back-dashboard"){view="dashboard";render();}
  else if(action==="submit-pin"){
    const val=document.getElementById("pin-field")?.value||"";
    if(isAdmin){if(val===ADMIN_PIN){view="admin";adminTab="results";render();}else showPinError("Wrong PIN");}
    else{if(val===currentPlayer.pin){view="dashboard";tab="picks";render();}else showPinError("Wrong PIN");}
  }
  else if(action==="logout"){currentPlayer=null;isAdmin=false;view="login";render();}
  else if(action==="set-tab"){tab=dataset.tab;document.getElementById("tab-content").innerHTML=renderTabContent();attachHandlers();}
  else if(action==="set-admin-tab"){adminTab=dataset.tab;document.getElementById("admin-content").innerHTML=renderAdminContent();attachHandlers();}
  else if(action==="open-group-picks"){view="group-picks";render();}
  else if(action==="open-ko-picks"){
    koRound=dataset.rnd;
    const ex=state.picks[currentPlayer.name]?.knockout?.[koRound]||{};
    koDraft={};Object.keys(ex).forEach(k=>{if(k!=="wildcard")koDraft[k]=ex[k];});
    koWildcard=ex.wildcard||"";view="ko-picks";render();
  }
  else if(action==="ko-pick"){
    const mid=dataset.mid,team=dataset.team;
    koDraft[mid]={team};
    document.querySelectorAll(`[data-mid="${mid}"]`).forEach(b=>b.classList.remove("sel"));
    document.querySelector(`[data-mid="${mid}"][data-team="${team}"]`)?.classList.add("sel");
    if(koRound&&WILDCARD_ROUNDS.includes(koRound)){
      const pts=[...new Set(Object.values(koDraft).map(p=>p.team).filter(Boolean))];
      const wcs=document.getElementById("wc-select");
      if(wcs){const cur=wcs.value;wcs.innerHTML=`<option value="">— select your wildcard —</option>${pts.map(t=>`<option value="${t}"${(koWildcard===t||cur===t)?" selected":""}>${t}</option>`).join("")}`;}
      if(koWildcard&&!pts.includes(koWildcard))koWildcard="";
    }
  }
  else if(action==="save-group-picks"){
    const picks={};
    document.querySelectorAll("[data-group][data-pos]").forEach(s=>{const g=s.dataset.group,pos=s.dataset.pos;if(!picks[g])picks[g]={};picks[g][pos]=s.value;});
    for(const g of GROUPS){const p=picks[g.name]||{};if(!p.first||!p.second){alert(`Please pick both 1st and 2nd for every group.`);return;}if(p.first===p.second){alert(`Group ${g.name}: 1st and 2nd must be different.`);return;}}
    const ov={...(state.overrides||{})};if(ov[currentPlayer.name])delete ov[currentPlayer.name].group;
    const ns={...state,overrides:ov,picks:{...state.picks,[currentPlayer.name]:{...state.picks[currentPlayer.name],groups:picks}}};
    await saveState(ns);
    const m=document.getElementById("grp-save-msg");if(m){m.style.display="block";setTimeout(()=>m.style.display="none",2000);}
  }
  else if(action==="save-ko-picks"){
    const ml=state.knockoutMatches?.[koRound]||[];
    if(!ml.length){alert("No matches set yet.");return;}
    for(let i=0;i<ml.length;i++){if(!koDraft[`m${i}`]?.team){alert("Pick a winner for every match.");return;}}
    const wcVal=document.getElementById("wc-select")?.value||koWildcard;
    if(WILDCARD_ROUNDS.includes(koRound)){if(!wcVal){alert("Please select your wildcard pick.");return;}}
    const ov={...(state.overrides||{})};if(ov[currentPlayer.name])delete ov[currentPlayer.name][koRound];
    const rd={...koDraft};if(WILDCARD_ROUNDS.includes(koRound))rd.wildcard=wcVal;
    const newKo={...(state.picks[currentPlayer.name]?.knockout||{}),[koRound]:rd};
    const ns={...state,overrides:ov,picks:{...state.picks,[currentPlayer.name]:{...state.picks[currentPlayer.name],knockout:newKo}}};
    await saveState(ns);
    const m=document.getElementById("ko-save-msg");if(m){m.style.display="block";setTimeout(()=>m.style.display="none",2000);}
  }
  else if(action==="save-grp-results"){
    const groups={...state.results.groups};
    document.querySelectorAll("[data-res-group]").forEach(s=>{const g=s.dataset.resGroup,pos=s.dataset.resPos;if(!groups[g])groups[g]={};groups[g][pos]=s.value;});
    await saveState({...state,results:{...state.results,groups}});alert("Group results saved!");
  }
  else if(action==="save-ko-results"){
    const knockout={...state.results.knockout};
    document.querySelectorAll("[data-ko-res-rnd]").forEach(s=>{const r=s.dataset.koResRnd,mid=s.dataset.koResMid;if(!knockout[r])knockout[r]={};knockout[r][mid]=s.value;});
    await saveState({...state,results:{...state.results,knockout}});alert("Knockout results saved!");
  }
  else if(action==="toggle-group-stage"){await saveState({...state,groupStageOpen:!state.groupStageOpen});document.getElementById("admin-content").innerHTML=renderAdminContent();attachHandlers();}
  else if(action==="save-deadline"){
    const rnd=dataset.rnd,val=document.getElementById(`dl-${rnd}`)?.value||"";
    await saveState({...state,knockoutDeadlines:{...state.knockoutDeadlines,[rnd]:val}});
    alert(`Deadline saved: ${fmt(val)}`);
  }
  else if(action==="save-matches"){
    const rnd=dataset.rnd,NUM={r32:16,r16:8,qf:4,sf:2,final:1};
    const matches=[],lines={};
    for(let i=0;i<NUM[rnd];i++){
      const home=document.getElementById(`home-${rnd}-${i}`)?.value.trim()||"";
      const away=document.getElementById(`away-${rnd}-${i}`)?.value.trim()||"";
      const line=document.getElementById(`line-${rnd}-${i}`)?.value.trim()||"";
      if(home&&away){matches.push({home,away});if(line)lines[`m${matches.length-1}`]=line;}
    }
    await saveState({...state,knockoutMatches:{...state.knockoutMatches,[rnd]:matches},knockoutLines:{...state.knockoutLines,[rnd]:lines}});
    alert(`${ROUND_NAMES[rnd]} matches & lines saved!`);
  }
  else if(action==="toggle-round"){
    const rnd=dataset.rnd;
    await saveState({...state,knockoutRounds:{...state.knockoutRounds,[rnd]:!state.knockoutRounds[rnd]}});
    document.getElementById("admin-content").innerHTML=renderAdminContent();attachHandlers();
  }
  else if(action==="grant-override"){
    const ov={...(state.overrides||{})};if(!ov[dataset.player])ov[dataset.player]={};ov[dataset.player][dataset.round]=true;
    await saveState({...state,overrides:ov});document.getElementById("admin-content").innerHTML=renderAdminContent();attachHandlers();
  }
  else if(action==="revoke-override"){
    const ov={...(state.overrides||{})};if(ov[dataset.player])delete ov[dataset.player][dataset.round];
    await saveState({...state,overrides:ov});document.getElementById("admin-content").innerHTML=renderAdminContent();attachHandlers();
  }
  else if(action==="adj-pts"){
    const grp=dataset.group,team=decodeURIComponent(dataset.team),delta=parseInt(dataset.delta),field=dataset.field||"pts";
    if(!state.groupStandings)state.groupStandings={};
    if(!state.groupStandings[grp])state.groupStandings[grp]={};
    if(!state.groupStandings[grp][team]||typeof state.groupStandings[grp][team]!=="object")state.groupStandings[grp][team]={pts:0,gd:0};
    const cur=state.groupStandings[grp][team][field]||0;
    const newVal=field==="pts"?Math.max(0,cur+delta):cur+delta;
    state.groupStandings[grp][team][field]=newVal;
    const elId=field==="pts"?`pts-${grp}-${encodeURIComponent(team)}`:`gd-${grp}-${encodeURIComponent(team)}`;
    const el2=document.getElementById(elId);
    if(el2)el2.textContent=field==="gd"?(newVal>0?`+${newVal}`:newVal===0?"0":`${newVal}`):newVal;
  }
  else if(action==="save-third-slots"){
    const slots={};
    document.querySelectorAll("[data-third-grp]").forEach(inp=>{
      const grp=decodeURIComponent(inp.dataset.thirdGrp);
      const val=(inp.value||"").trim();
      if(val) slots[grp]=val;
    });
    // Sanitize keys for Firebase (replace / with _)
    const sanitized={};
    Object.keys({...thirdSlots,...slots}).forEach(function(k){
      sanitized[k.replace(/\//g,"_")]=({...thirdSlots,...slots})[k];
    });
    thirdSlots={...thirdSlots,...slots};
    try {
      await set(thirdSlotsRef, sanitized);
      alert("3rd place slots saved!");
    } catch(e) {
      alert("Save failed: "+e.message);
    }
  }
  else if(action==="save-bracket-results"){
    const br=JSON.parse(JSON.stringify(state.bracketResults||{r32:{},r16:{},qf:{},sf:{},final:{},third:{}}));
    document.querySelectorAll("[data-bracket-rnd]").forEach(s=>{
      const rnd=s.dataset.bracketRnd,mid=s.dataset.bracketMid;
      if(!br[rnd])br[rnd]={};
      if(s.value) br[rnd][mid]=s.value;
    });
    await saveState({...state,bracketResults:br});
    alert("Bracket results saved!");
  }
  else if(action==="save-standings"){
    await saveState({...state});
    alert("Standings saved!");
  }
  else if(action==="bracket-scroll"){
    const rnd=dataset.rnd;
    const col=document.getElementById(`bcol-${rnd}`);
    const outer=document.getElementById("bracket-outer");
    if(col&&outer){
      const colLeft=col.offsetLeft-20;
      outer.scrollTo({left:colLeft,behavior:"smooth"});
    }
    document.querySelectorAll(".btab").forEach(t=>{
      t.style.color=t.dataset.rnd===rnd?"#1a1a1a":"#b0a898";
      t.style.borderBottomColor=t.dataset.rnd===rnd?"#1a1a1a":"transparent";
    });
  }
  else if(action==="set-picks-round"){
    window._picksRound=dataset.rnd;
    document.getElementById("tab-content").innerHTML=renderTabContent();
    attachHandlers();
  }
  else if(action==="set-picks-player"){
    window._selectedPicksPlayer=dataset.name;
    document.getElementById("tab-content").innerHTML=renderTabContent();attachHandlers();
  }
}

function showPinError(msg){const el=document.getElementById("pin-error");if(el){el.textContent=msg;el.style.display="block";}}

function renderAdminStandings(){
  const gs=state.groupStandings||{};
  let html=`<div class="notice" style="text-align:left">Update points and goal difference for each team. Teams sort by points, then GD if tied.</div>`;
  GROUPS.forEach(g=>{
    html+=`<div class="card" style="padding:12px 16px;margin-bottom:8px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;margin-bottom:10px">Group ${g.name}</div>
      <div style="display:flex;align-items:center;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">
        <span style="flex:1">Team</span><span style="width:90px;text-align:center">PTS</span><span style="width:90px;text-align:center">GD</span>
      </div>`;
    g.teams.forEach(team=>{
      const d=gs[g.name]?.[team]||{pts:0,gd:0};
      const gdStr=d.gd>0?`+${d.gd}`:d.gd===0?"0":`${d.gd}`;
      html+=`<div style="display:flex;align-items:center;gap:4px;padding:8px 0;border-top:0.5px solid var(--border)">
        <div style="flex:1;font-size:13px;font-weight:500">${team}</div>
        <div style="display:flex;align-items:center;gap:4px;width:90px;justify-content:center">
          <button class="btn sm" data-action="adj-pts" data-group="${g.name}" data-team="${encodeURIComponent(team)}" data-field="pts" data-delta="-1" style="padding:3px 8px;font-size:14px;line-height:1">−</button>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;width:24px;text-align:center" id="pts-${g.name}-${encodeURIComponent(team)}">${d.pts}</div>
          <button class="btn sm" data-action="adj-pts" data-group="${g.name}" data-team="${encodeURIComponent(team)}" data-field="pts" data-delta="1" style="padding:3px 8px;font-size:14px;line-height:1">+</button>
        </div>
        <div style="display:flex;align-items:center;gap:4px;width:90px;justify-content:center">
          <button class="btn sm" data-action="adj-pts" data-group="${g.name}" data-team="${encodeURIComponent(team)}" data-field="gd" data-delta="-1" style="padding:3px 8px;font-size:14px;line-height:1">−</button>
          <div style="font-size:13px;font-weight:500;width:28px;text-align:center" id="gd-${g.name}-${encodeURIComponent(team)}">${gdStr}</div>
          <button class="btn sm" data-action="adj-pts" data-group="${g.name}" data-team="${encodeURIComponent(team)}" data-field="gd" data-delta="1" style="padding:3px 8px;font-size:14px;line-height:1">+</button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  html+=`<button class="btn accent" style="margin-top:8px" data-action="save-standings">Save standings →</button>`;
  return html;
}

function renderAdminBracket(){
  var s=state;
  var html='';
  html+='<div class="notice" style="text-align:left;margin-bottom:12px">Select winners round by round. Group stage auto-fills from your results. 3rd place slots must be typed in manually.</div>';

  // 3rd place slots - keep as text input but with all 48 teams as datalist
  var thirdGroups=["A/B/C/D/F","C/D/F/G/H","C/E/F/H/I","E/H/I/J/K","B/E/F/I/J","A/E/H/I/J","E/F/G/I/J","D/E/I/J/L"];

  html+='<div class="section-title">3rd place qualifiers</div>';
  thirdGroups.forEach(function(grp){
    var val=thirdSlots[grp]||'';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html+='<div style="font-size:12px;color:var(--muted2);width:110px;flex-shrink:0">3rd '+grp+'</div>';
    html+='<select class="admin-input" data-third-grp="'+encodeURIComponent(grp)+'" style="flex:1">';
    html+='<option value="">— select team —</option>';
    Object.keys(FLAGS).sort().forEach(function(t){
      html+='<option value="'+t+'"'+(val===t?' selected':'')+'>'+t+'</option>';
    });
    html+='</select>';
    html+='</div>';
  });
  html+='<button class="btn accent" style="margin-bottom:20px" data-action="save-third-slots">Save 3rd place slots &#8594;</button>';

  // Knockout rounds - dropdowns
  var ADMIN_ROUNDS=[
    {key:"r32",full:"Round of 32"},
    {key:"r16",full:"Round of 16"},
    {key:"qf",full:"Quarterfinals"},
    {key:"sf",full:"Semifinals"},
    {key:"final",full:"Final"},
    {key:"third",full:"3rd Place"}
  ];

  ADMIN_ROUNDS.forEach(function(rnd){
    var matches=BRACKET_MATCHES[rnd.key]||[];
    if(!matches.length)return;
    html+='<div class="section-title">'+rnd.full+'</div>';
    matches.forEach(function(match){
      var home=resolveTeam(match.home,s)||getSlotLabel(match.home,s);
      var away=resolveTeam(match.away,s)||getSlotLabel(match.away,s);
      var winner=((s.bracketResults||{})[rnd.key]||{})[match.id]||'';
      var homeReal=!!resolveTeam(match.home,s);
      var awayReal=!!resolveTeam(match.away,s);
      html+='<div class="card-sm" style="margin-bottom:8px">';
      html+='<div style="font-size:11px;color:var(--muted);margin-bottom:8px">'+match.label+': '+(FLAGS[home]||'')+' '+home+' vs '+(FLAGS[away]||'')+' '+away+'</div>';
      html+='<select class="admin-input" data-bracket-rnd="'+rnd.key+'" data-bracket-mid="'+match.id+'" style="width:100%">';
      html+='<option value="">— select winner —</option>';
      if(homeReal||home!=="TBD") html+='<option value="'+home+'"'+(winner===home?' selected':'')+'>'+home+'</option>';
      if(awayReal||away!=="TBD") html+='<option value="'+away+'"'+(winner===away?' selected':'')+'>'+away+'</option>';
      html+='</select>';
      html+='</div>';
    });
  });

  html+='<button class="btn accent" style="margin-top:8px" data-action="save-bracket-results">Save bracket results &#8594;</button>';
  return html;
}

// Single delegated click handler for entire app
document.addEventListener("click", async function(e){
  const el = e.target.closest("[data-action]");
  if(!el) return;
  e.preventDefault();
  await handleAction(el.dataset.action, el.dataset);
});

// Load state from Firebase
const stateRef=ref(db,"poolState");
const thirdSlotsRef=ref(db,"thirdSlots");
let thirdSlots={};
// Separate persistent listener for 3rd place slots - never gets overwritten
onValue(thirdSlotsRef, snapshot=>{
  const data=snapshot.val();
  if(data){
    // Restore / from _ in keys
    thirdSlots={};
    Object.keys(data).forEach(function(k){
      thirdSlots[k.replace(/_/g,"/")]=data[k];
    });
  }
});

let initialLoad = true;
onValue(stateRef,snapshot=>{
  const data=snapshot.val();
  if(data){
    if(!data.picks)data.picks={};
    PLAYERS.forEach(p=>{if(!data.picks[p.name])data.picks[p.name]={groups:{},knockout:{}};});
    if(!data.results)data.results={groups:{},knockout:{}};
    if(!data.overrides)data.overrides={};
    if(!data.bracketResults)data.bracketResults={r32:{},r16:{},qf:{},sf:{},final:{},third:{}};
    ["r32","r16","qf","sf","final","third"].forEach(r=>{if(!data.bracketResults[r])data.bracketResults[r]={};});
    if(!data.groupStandings){data.groupStandings=Object.fromEntries(GROUPS.map(g=>[g.name,Object.fromEntries(g.teams.map(t=>[t,{pts:0,gd:0}]))]));}
    state=data;
  } else {
    state=JSON.parse(JSON.stringify(DEFAULT_STATE));
    set(stateRef,state);
  }
  if(initialLoad){
    initialLoad=false;
    render();
  } else {
    // Don't re-render admin view on background Firebase updates
    // This prevents input fields from being wiped while admin is editing
    if(view==="dashboard"){
      const tc=document.getElementById("tab-content");
      if(tc){tc.innerHTML=renderTabContent();attachHandlers();}
    }
    // For admin: silently update state but do NOT re-render the page
    // Admin will see fresh data next time they navigate to a tab
  }
});
</script>
